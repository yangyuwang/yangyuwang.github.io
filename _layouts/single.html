---
layout: default
---

<div class="post-wrap">

  <a href="{{ '/projects/' | relative_url }}" class="post-back">
    &larr; Back to Projects
  </a>

  <header class="post-header">
    {% if page.categories.first %}
    <p class="post-category-label">{{ page.categories.first }}</p>
    {% endif %}

    <h1 class="post-title">{{ page.title }}</h1>

    {% if page.tags.size > 0 %}
    <div class="post-tags">
      {% for tag in page.tags %}
      <span class="post-tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

</div>
